name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  windows:
    runs-on: windows-latest

    steps:
        - uses: actions/checkout@v4

        - name: Setup Axmol
          shell: pwsh
          run: |
            git clone --depth=1 https://github.com/axmolengine/axmol $env:RUNNER_TEMP\axmol

        - name: Configure project
          shell: pwsh
          run: |
            cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DAX_ROOT="$env:RUNNER_TEMP\axmol"

        - name: Build
          shell: pwsh
          run: |
            cmake --build build --config Release

        - name: Upload artifact
          uses: actions/upload-artifact@v4
          with:
            name: Windows-Build
            path: build/bin/Release/**


  macos:
    name: macOS Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install cmake ninja

      - name: Clone Axmol
        run: |
          git clone --depth=1 https://github.com/axmolengine/axmol $RUNNER_TEMP/axmol

      - name: Build macOS
        run: |
          chmod +x $RUNNER_TEMP/axmol/build.sh
          $RUNNER_TEMP/axmol/build.sh -d $RUNNER_TEMP/axmol -xb --config Release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Build
          path: |
            ${{ runner.temp }}/axmol/build/bin/Release/**


  emscripten:
    name: Web (Emscripten) Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3

      - name: Setup Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git $RUNNER_TEMP/emsdk
          cd $RUNNER_TEMP/emsdk
          ./emsdk install latest
          ./emsdk activate latest

      - name: Clone Axmol
        run: |
          git clone --depth=1 https://github.com/axmolengine/axmol $RUNNER_TEMP/axmol

      - name: Build Web
        shell: bash
        run: |
          source $RUNNER_TEMP/emsdk/emsdk_env.sh
          chmod +x $RUNNER_TEMP/axmol/build_web.sh
          $RUNNER_TEMP/axmol/build_web.sh -d $RUNNER_TEMP/axmol -xb --config Release

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: Web-Build
          path: |
            ${{ runner.temp }}/axmol/bin/web/**


  package:
    name: Collect All Artifacts
    runs-on: ubuntu-latest
    needs: [windows, macos, emscripten]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload combined archive
        uses: actions/upload-artifact@v4
        with:
          name: All-Builds
          path: artifacts